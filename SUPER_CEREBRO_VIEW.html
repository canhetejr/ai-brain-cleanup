<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Super Cérebro • Grafo</title>
  <style>
    :root{--bg:#040404;--line:rgba(255,255,255,.12);--text:#f4f4f4;--muted:#a0a0a0;--root:#fff;--cat:#d7d7d7;--item:#efefef;}
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 20%, #171717 0%, #0a0a0a 45%, #030303 100%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}
    .ui{position:absolute;left:14px;right:14px;top:12px;z-index:3;display:flex;justify-content:space-between;gap:12px;align-items:flex-start;pointer-events:none}
    .brand{pointer-events:auto;max-width:48vw}
    .brand h1{margin:0;font-size:clamp(26px,3.6vw,40px);line-height:.92;letter-spacing:-.06em}
    .brand p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.45;max-width:58ch}
    .bar{pointer-events:auto;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;align-items:center;max-width:48vw}
    .input,.select,.btn{border:1px solid var(--line);background:rgba(10,10,10,.68);color:var(--text);border-radius:14px;padding:11px 14px;font:inherit;outline:none;backdrop-filter:blur(10px)}
    .input{min-width:min(300px,44vw)}
    .select{min-width:150px}
    .btn{cursor:pointer;background:#f2f2f2;color:#0a0a0a;font-weight:800}
    .tagline{position:absolute;left:14px;bottom:14px;z-index:3;pointer-events:none;color:var(--muted);font-size:12px}
    .toast{position:absolute;right:14px;bottom:14px;z-index:3;max-width:min(360px,calc(100vw - 28px));padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:rgba(10,10,10,.72);backdrop-filter:blur(10px);font-size:13px;line-height:1.45;color:var(--muted);min-height:52px}
    svg{display:block;width:100%;height:100%}
    .link{stroke:rgba(255,255,255,.15);stroke-width:1.35;stroke-linecap:round}
    .link.fade{stroke:rgba(255,255,255,.07)}
    .node{cursor:pointer;transform-origin:center;transition:transform .12s ease,opacity .12s ease}
    .node:hover{transform:scale(1.05)}
    .root{fill:#fff;stroke:#fff;stroke-width:1.2}
    .cat{fill:#d7d7d7;stroke:#fff;stroke-width:1}
    .item{fill:#efefef;stroke:#222;stroke-width:1}
    .dim{opacity:.16}
    .rootLabel{fill:#0a0a0a;font-size:15px;font-weight:900;text-anchor:middle;pointer-events:none}
    .catLabel{fill:#101010;font-size:13px;font-weight:800;text-anchor:middle;pointer-events:none}
    .small{fill:#8f8f8f;font-size:11px;text-anchor:middle;pointer-events:none}
    .itemLabel{fill:#f4f4f4;font-size:12px;font-weight:700;pointer-events:none;text-shadow:0 0 6px rgba(0,0,0,.8)}
    @media (max-width: 800px){
      html,body{overflow:auto}
      .ui{flex-direction:column;align-items:stretch}
      .brand,.bar{max-width:none}
      .bar{justify-content:flex-start}
      .input{min-width:0;flex:1}
      .select{min-width:0;flex:1}
      svg{height:calc(100vh - 220px);min-height:520px}
      .toast{position:relative;right:auto;bottom:auto;margin:0 14px 14px 14px;max-width:none}
      .tagline{position:relative;left:auto;bottom:auto;margin:0 14px 14px 14px}
    }
  </style>
</head>
<body>
  <div class="ui">
    <div class="brand">
      <h1>Super Cérebro • Grafo</h1>
      <p>Sem dashboard, sem tabela, sem ruído. Por padrão só o núcleo e as categorias; clique para expandir e buscar no grafo.</p>
    </div>
    <div class="bar">
      <input id="q" class="input" type="search" placeholder="Buscar..." />
      <select id="scope" class="select">
        <option value="all">Todas</option>
        <option value="core">Core</option>
        <option value="hermes">Hermes</option>
        <option value="claude">Claude</option>
      </select>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>

  <svg id="svg" viewBox="0 0 1400 900" aria-label="Grafo do Super Cérebro" role="img"></svg>

  <div class="tagline">Clique nos nós. A interface começa com o mínimo possível.</div>
  <div class="toast" id="toast">Visão geral: clique numa categoria para abrir seus itens.</div>

  <script>
    const DATA = {
      core: [
        { name: 'AI Brain local', path: '~/.ai-brain/README.md', summary: 'Índice do diretório local do cérebro.' },
        { name: 'Índice mestre', path: '~/.ai-brain/INDEX.md', summary: 'Mapa principal do conteúdo indexado.' },
        { name: 'brain_config.yaml', path: '~/.ai-brain/brain_config.yaml', summary: 'Configurações e identidade do cérebro.' },
      ],
      hermes: [
        { name: 'Hermes Agent', path: '~/.hermes/skills/autonomous-ai-agents/hermes-agent/SKILL.md', summary: 'Skill base para operar Hermes.' },
        { name: 'Super Cérebro Bridge', path: '~/.hermes/skills/autonomous-ai-agents/super-cerebro-bridge/SKILL.md', summary: 'Ponte entre Hermes e o cérebro local.' },
        { name: 'Knowledge Work Automation', path: '~/.hermes/skills/productivity/knowledge-work-automation/SKILL.md', summary: 'Automação de trabalho de conhecimento.' },
        { name: 'Docker Compose Apps', path: '~/.hermes/skills/devops/docker-compose-self-hosted-apps/SKILL.md', summary: 'Deploy e verificação de apps self-hosted.' },
        { name: 'Visual Artifact Studio', path: '~/.hermes/skills/creative/visual-artifact-studio/SKILL.md', summary: 'Artefatos visuais e HTML polido.' },
      ],
      claude: [
        { name: 'settings.json', path: '~/.claude/settings.json', summary: 'Configuração local do Claude.' },
      ],
    };

    const catMeta = {
      core: { label: 'Core', x: 700, y: 165 },
      hermes: { label: 'Hermes', x: 1000, y: 550 },
      claude: { label: 'Claude', x: 400, y: 550 },
    };

    const svg = document.getElementById('svg');
    const q = document.getElementById('q');
    const scope = document.getElementById('scope');
    const reset = document.getElementById('reset');
    const toast = document.getElementById('toast');

    let expanded = new Set();
    let selected = null;

    function el(name, attrs = {}) {
      const n = document.createElementNS('http://www.w3.org/2000/svg', name);
      for (const [k, v] of Object.entries(attrs)) n.setAttribute(k, v);
      return n;
    }

    function norm(s) { return String(s || '').toLowerCase(); }

    function filteredCats() {
      const s = scope.value;
      const qv = norm(q.value.trim());
      const result = {};
      for (const [cat, items] of Object.entries(DATA)) {
        if (s !== 'all' && s !== cat) continue;
        const filtered = items.filter(item => {
          const hay = norm(`${cat} ${item.name} ${item.path} ${item.summary}`);
          return !qv || hay.includes(qv);
        });
        if (filtered.length) result[cat] = filtered;
      }
      return result;
    }

    function setToast(text) { toast.textContent = text; }

    function render() {
      const cats = filteredCats();
      svg.innerHTML = '';
      const W = 1400, H = 900, cx = 700, cy = 365;

      const defs = el('defs');
      defs.innerHTML = `<linearGradient id="linkGrad" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.34"></stop><stop offset="100%" stop-color="#8c8c8c" stop-opacity="0.16"></stop></linearGradient>`;
      svg.appendChild(defs);
      svg.appendChild(el('rect', { x: 0, y: 0, width: W, height: H, fill: 'transparent' }));

      svg.appendChild(el('circle', { cx, cy, r: 48, class: 'root' }));
      const rootText = el('text', { x: cx, y: cy + 6, class: 'rootLabel' });
      rootText.textContent = 'TanIA';
      svg.appendChild(rootText);

      for (const [cat, meta] of Object.entries(catMeta)) {
        if (!cats[cat]) continue;
        const items = cats[cat];
        const isExpanded = expanded.has(cat) || q.value.trim();
        const dimOthers = selected && selected.type === 'item' && selected.cat !== cat;

        svg.appendChild(el('line', { x1: cx, y1: cy, x2: meta.x, y2: meta.y, class: 'link' + (dimOthers ? ' fade' : '') }));

        const cg = el('g', { class: 'node' + (dimOthers ? ' dim' : '') });
        cg.appendChild(el('circle', { cx: meta.x, cy: meta.y, r: 34, class: 'cat' }));
        const ct = el('text', { x: meta.x, y: meta.y + 5, class: 'catLabel' });
        ct.textContent = meta.label;
        cg.appendChild(ct);
        const cs = el('text', { x: meta.x, y: meta.y + 26, class: 'small' });
        cs.textContent = `${items.length} itens`;
        cg.appendChild(cs);
        cg.addEventListener('click', () => {
          if (expanded.has(cat)) expanded.delete(cat); else expanded.add(cat);
          selected = { type:'cat', cat };
          setToast(`${meta.label}: ${items.length} itens visíveis. Clique novamente para recolher.`);
          render();
        });
        svg.appendChild(cg);

        if (isExpanded) {
          const ring = cat === 'core' ? 140 : 128;
          items.forEach((item, i) => {
            const a0 = cat === 'core' ? -Math.PI/2 : cat === 'hermes' ? 0.2 : 2.8;
            const t = items.length === 1 ? 0 : (i / (items.length - 1) - 0.5);
            const a = a0 + t * 0.9;
            const x = meta.x + Math.cos(a) * ring;
            const y = meta.y + Math.sin(a) * ring;
            const focus = selected && selected.type === 'item' && selected.cat === cat && selected.name === item.name;
            svg.appendChild(el('line', { x1: meta.x, y1: meta.y, x2: x, y2: y, class: 'link fade' + ((selected && selected.type === 'item' && selected.cat !== cat) ? ' dim' : '') }));
            const ig = el('g', { class: 'node' + ((selected && selected.type === 'item' && selected.cat !== cat) ? ' dim' : '') });
            ig.appendChild(el('circle', { cx: x, cy: y, r: 12 + Math.min(4, item.name.length / 16), class: 'item' }));
            if (focus) {
              const tx = el('text', { x: x + 18, y: y + 4, class: 'itemLabel' });
              tx.textContent = item.name;
              ig.appendChild(tx);
            }
            ig.appendChild(el('title', {})).textContent = `${item.name}\n${item.path}\n${item.summary}`;
            ig.addEventListener('click', (ev) => {
              ev.stopPropagation();
              selected = { type:'item', cat, ...item };
              setToast(`${item.name} • ${cat} • ${item.path}`);
              render();
            });
            svg.appendChild(ig);
          });
        }
      }

      if (!Object.keys(cats).length) {
        const note = el('text', { x: cx, y: cy + 128, class: 'small' });
        note.textContent = 'Nada encontrado';
        svg.appendChild(note);
      }
    }

    q.addEventListener('input', () => {
      selected = null;
      expanded = new Set();
      setToast(q.value.trim() ? `Busca ativa: ${q.value.trim()}` : 'Visão geral: clique numa categoria para abrir seus itens.');
      render();
    });

    scope.addEventListener('change', () => {
      selected = null;
      expanded = new Set();
      setToast('Filtro alterado.');
      render();
    });

    reset.addEventListener('click', () => {
      q.value = '';
      scope.value = 'all';
      expanded = new Set();
      selected = null;
      setToast('Visão geral: clique numa categoria para abrir seus itens.');
      render();
    });

    svg.addEventListener('click', (e) => {
      if (e.target === svg || e.target.tagName === 'rect') {
        selected = null;
        setToast('Visão geral: clique numa categoria para abrir seus itens.');
        render();
      }
    });

    render();
  </script>
</body>
</html>
